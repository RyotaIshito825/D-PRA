<!DOCTYPE html>
<html class="h-100" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="commons/header :: head_fragment(title = 'はじめに')"></head>

<body class="">
    <div class="contents" style="background-color: #f7f7f7">
        <!-- サイドバー -->
        <!-- <div th:replace="commons/side_bar :: side_bar"></div> -->

                <!-- メイン -->
        <div class="guides" style="background-color: #f7f7f7">
            <div class="guides_inner">
                <!-- 参考: https://www.resume.id/ -->
                <div class="guides_howto">
                    <h3 class="guides_howto-title">
                        <span class="guides_howto-text">How to use</span>
                    </h3>
                    <div class="guides_howto-steps">
                        <div class="guides_howto-steps_inner">
                            <div class="guides_howto-step">
                                <div class="guides_howto-step-titles">
                                    <span class="guides_howto-step-title">使い方をざっくり確認</span>
                                </div>
                                <div class="guides_howto-step-subtitles">
                                    <span class="guides_howto-step-subtitle">トップ画面の上部記載の項目をクリックして出来ること・<br>出来ないことを確認しよう！</span>
                                </div>
                            </div>
                            <div class="guides_howto-step">
                                <div class="guides_howto-step-titles">
                                    <span class="guides_howto-step-title">店舗名登録とテンプレート選択</span>
                                </div>
                                <div class="guides_howto-step-subtitles">
                                    <span class="guides_howto-step-subtitle">カードに記載する店舗名・画像を登録！<br>さらにテンプレートを選択しよう！</span>
                                </div>
                            </div>
                            <div class="guides_howto-step">
                                <div class="guides_howto-step-titles">
                                    <span class="guides_howto-step-title">いざ車両の登録！そして作成！</span>
                                </div>
                                <div class="guides_howto-step-subtitles">
                                    <span class="guides_howto-step-subtitle">車両情報と登録しいざ作成！<br>遷移ページで追加情報等を登録してダウンロード！</span>
                                </div>
                            </div>
                            <div class="guides_howto-step">
                                <div class="guides_howto-step-titles">
                                    <span class="guides_howto-step-title">Excelファイルから一括作成！</span>
                                </div>
                                <div class="guides_howto-step-subtitles">
                                    <span class="guides_howto-step-subtitle">Excelのテンプレートをダウンロードしよう！<br>車両情報を入力したら一括取込！<br>※Excelのフォーマットは絶対に変えないこと！</span>
                                </div>
                            </div>
                            <div class="go-to_car-list-btns">
                                <a th:href="@{/cars/list}" class="go-to_car-list-btn">車両一覧画面へ</a>
                            </div>
                        </div>
                    </div>
                    <div class="guides_images">
                        <div class="guides_image" id="guides_image1">
                            <img th:src="@{/img/guide1/1-1.png}" alt="" class="guides_img">
                            <img th:src="@{/img/guide1/1-2.png}" alt="" class="guides_img">
                            <img th:src="@{/img/guide1/1-3.png}" alt="" class="guides_img">
                        </div>
                        <div class="guides_image" id="guides_image2">
                            <img th:src="@{/img/guide2/2-1.png}" alt="" class="guides_img">
                            <img th:src="@{/img/guide2/2-2.png}" alt="" class="guides_img">
                            <img th:src="@{/img/guide2/2-3.png}" alt="" class="guides_img">
                        </div>
                        <div class="guides_image" id="guides_image3">
                            <img th:src="@{/img/guide3/3-1.png}" alt="" class="guides_img">
                            <img th:src="@{/img/guide3/3-2.png}" alt="" class="guides_img">
                            <img th:src="@{/img/guide3/3-3.png}" alt="" class="guides_img">
                        </div>
                        <div class="guides_image" id="guides_image4">
                            <img th:src="@{/img/guide4/4-1.png}" alt="" class="guides_img">
                            <img th:src="@{/img/guide4/4-2.png}" alt="" class="guides_img">
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

        const guidesImage4 = document.getElementById("guides_image4");

            let rect1Top = guidesImage1.getBoundingClientRect().top;

            let rect2Top = guidesImage2.getBoundingClientRect().top;
            let rect2Bottom = guidesImage2.getBoundingClientRect().bottom;

            let rect4Bottom = guidesImage4.getBoundingClientRect().bottom;
            
            const scrollY = window.scrollY;

                guidesHowtoStepTitles[0].style.opacity = "0.4";
                guidesHowtoStepSubtitles[0].style.opacity = "0.4";

            } else if (rect1Bottom > 120) {
                guidesHowtoStepTitles[0].style.fontSize = "30px";
                guidesHowtoStepSubtitles[0].style.fontSize = "16px";
                guidesHowtoStepTitles[0].style.opacity = "1";
                guidesHowtoStepSubtitles[0].style.opacity = "1";
            }

            if (rect2Top <= 250 && rect2Bottom > 110) {
                guidesHowtoStepTitles[1].style.fontSize = "30px";
                guidesHowtoStepSubtitles[1].style.fontSize = "16px";
                guidesHowtoStepTitles[1].style.opacity = "1";

                guidesHowtoStepTitles[1].style.fontSize = "20px";

                guidesHowtoStepTitles[1].style.opacity = "0.4";

            }

            if (rect3Top <= 250 && rect3Bottom > 110) {
                guidesHowtoStepTitles[2].style.fontSize = "30px";
                guidesHowtoStepSubtitles[2].style.fontSize = "16px";
                guidesHowtoStepTitles[2].style.opacity = "1";
                guidesHowtoStepSubtitles[2].style.opacity = "1";

                guidesHowtoStepTitles[2].style.fontSize = "20px";
                guidesHowtoStepSubtitles[2].style.fontSize = "14px";
                guidesHowtoStepTitles[2].style.opacity = "0.4";
                guidesHowtoStepSubtitles[2].style.opacity = "0.4";
            } else if (rect3Top > 120) {
                guidesHowtoStepTitles[2].style.fontSize = "20px";
                guidesHowtoStepSubtitles[2].style.fontSize = "14px";
                guidesHowtoStepTitles[2].style.opacity = "0.4";
                guidesHowtoStepSubtitles[2].style.opacity = "0.4";
            }

            if (rect4Top <= 250) {
                guidesHowtoStepTitles[3].style.fontSize = "30px";
                guidesHowtoStepSubtitles[3].style.fontSize = "16px";
                guidesHowtoStepTitles[3].style.opacity = "1";
                guidesHowtoStepSubtitles[3].style.opacity = "1";
            } else if (rect4Bottom > 120) {
                guidesHowtoStepTitles[3].style.fontSize = "20px";
                guidesHowtoStepSubtitles[3].style.fontSize = "14px";
                guidesHowtoStepTitles[3].style.opacity = "0.4";
                guidesHowtoStepSubtitles[3].style.opacity = "0.4";
            }
        });
    </script>
    
</body>
</html>
